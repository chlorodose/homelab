apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespaces.yaml
  - repos/
  - fluxcd/fluxcd.yaml
  - crd/crd.yaml
  - infra/infra.yaml
  - service/service.yaml
components:
  - utils
patches:
  - target:
      group: kustomize.toolkit.fluxcd.io
      kind: Kustomization
      name: fluxcd
    patch: |
      - op: replace
        path: /spec/wait
        value: false
      - op: replace
        path: /spec/deletionPolicy
        value: Orphan
