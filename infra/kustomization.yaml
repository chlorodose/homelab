apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - cilium.yaml
  - proxmox-ccm.yaml
  - proxmox-csi.yaml
  - spegel.yaml
  - cloudflared.yaml
  - cert-manager.yaml
  - envoy-gateway.yaml
  - cnpg.yaml
  - reflector.yaml
  - garage.yaml
  - redis.yaml
patches:
  - target:
      group: helm.toolkit.fluxcd.io
      kind: HelmRelease
      name: redis
    patch: |
      - op: add
        path: /spec/test
        value:
          enable: false
components:
  - ../utils
