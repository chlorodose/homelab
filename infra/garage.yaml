apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: garage
spec:
  url: oci://ghcr.io/rajsinghtech/charts/garage-operator
  ref:
    semver: "^0.3"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: garage
spec:
  targetNamespace: manager
  chartRef:
    kind: OCIRepository
    name: garage
  values:
    crds:
      install: false
    image:
      tag: "sha-8d1c68f" # 0.3.7
---
apiVersion: garage.rajsingh.info/v1alpha1
kind: GarageCluster
metadata:
  name: garage
  namespace: database
spec:
  replicas: 1
  replication:
    factor: 1
    consistencyMode: consistent
  storage:
    metadata:
      storageClassName: proxmox-nvram
      size: 2Gi
    data:
      size: 256Gi
      storageClassName: proxmox-storage
  network:
    rpcBindPort: 3901
    service:
      type: ClusterIP
  s3Api:
    bindPort: 3900
    region: garage
  webApi:
    disabled: true
  admin:
    enabled: true
    bindPort: 3903
    adminTokenSecretRef:
      name: garage-admin-token
      key: admin-token
  database:
    engine: sqlite
---
apiVersion: garage.rajsingh.info/v1alpha1
kind: GarageKey
metadata:
  name: garage-admin-key
  namespace: database
spec:
  clusterRef:
    name: garage
  allBuckets:
    read: true
    write: true
    owner: true
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: garage
  namespace: manager
spec:
  parentRefs:
    - name: default
  hostnames:
    - garage.internal.chlorodose.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: garage
          namespace: database
          kind: Service
          port: 3900
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: from-gateway-to-garage
  namespace: database
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: manager
  to:
    - group: ""
      kind: Service
      name: garage
