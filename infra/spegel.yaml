apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: spegel
spec:
  url: oci://ghcr.io/spegel-org/helm-charts/spegel
  ref:
    semver: "^0.6"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: spegel
spec:
  targetNamespace: kube-system
  chartRef:
    kind: OCIRepository
    name: spegel
  values:
    spegel:
      containerdRegistryConfigPath: /etc/cri/conf.d/hosts
