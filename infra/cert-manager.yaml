apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: cert-manager
spec:
  url: oci://quay.io/jetstack/charts/cert-manager
  ref:
    semver: "^1.20"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
spec:
  targetNamespace: manager
  chartRef:
    kind: OCIRepository
    name: cert-manager
  values:
    prometheus:
      servicemonitor:
        enabled: true
    dns01RecursiveNameserversOnly: true
    dns01RecursiveNameservers: https://1.1.1.1/dns-query
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: chlorodose.me
  namespace: manager
spec:
  acme:
    email: chlorodose@chlorodose.me
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-account-key
    solvers:
      - dns01:
          cloudflare:
            email: chlorodose@chlorodose.me
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
spec:
  selfSigned: {}
