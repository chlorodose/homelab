apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: cnpg-crds
spec:
  url: oci://ghcr.io/cloudnative-pg/charts/cloudnative-pg
  ref:
    semver: "^0.29"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg-crds
spec:
  chartRef:
    kind: OCIRepository
    name: cnpg-crds
  values:
    crds:
      create: true
  postRenderers:
    - kustomize:
        patches:
          - target: {}
            patch: |
              - op: add
                path: /metadata/annotations/delete
                value: "1"
          - target:
              kind: CustomResourceDefinition
            patch: |
              - op: remove
                path: /metadata/annotations/delete
          - target:
              annotationSelector: "delete=1"
            patch: |
              kind: unused
              metadata:
                name: unused
              $patch: delete
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: cnpg-plugin-barman-crds
spec:
  url: oci://ghcr.io/wiremind/wiremind-helm-charts/plugin-barman-cloud-crds
  ref:
    semver: "^0.11"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg-plugin-barman-crds
spec:
  chartRef:
    kind: OCIRepository
    name: cnpg-plugin-barman-crds
