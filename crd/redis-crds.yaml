apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: redis-crds
spec:
  url: oci://ghcr.io/dragonflydb/dragonfly-operator/helm/dragonfly-operator
  ref:
    semver: "^1.5"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis-crds
spec:
  chartRef:
    kind: OCIRepository
    name: redis-crds
  values:
    crds:
      install: true
  postRenderers:
    - kustomize:
        patches:
          - target: {}
            patch: |
              - op: add
                path: /metadata/annotations/delete
                value: "1"
          - target:
              kind: CustomResourceDefinition
            patch: |
              - op: remove
                path: /metadata/annotations/delete
          - target:
              annotationSelector: "delete=1"
            patch: |
              kind: unused
              metadata:
                name: unused
              $patch: delete
