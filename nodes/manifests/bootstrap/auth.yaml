apiVersion: v1
kind: ServiceAccount
metadata:
  name: bootstrap-script
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bootstrap-script-binding
subjects:
  - kind: ServiceAccount
    name: bootstrap-script
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
